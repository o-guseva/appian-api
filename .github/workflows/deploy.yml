name: Deploy from CALI DEV -> CALI

on:
  push:
    branches:
    - main
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Checkout
      run: |
        curl -X POST "https://cali-dev.iem-digital.com/suite/deployment-management/v2/deployments" \
        -H "Appian-API-Key: ${{  secrets.APPIAN_API_KEY }}" \
        -H "Action-Type: import" \
        -F "file=@appian-file.zip" \
        -F "name=Auto-Deployment"


