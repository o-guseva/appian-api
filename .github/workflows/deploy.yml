name: Deploy from CALI DEV -> CALI

on:
  push:
    branches:
    - main
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger Appian Deployment
      run: |
        curl -X POST "https://cali-dev.iem-digital.com/suite/deployment-management/v2/deployments" \
        -H "Appian-API-Key: ${{  secrets.APPIAN_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{
          "name": "Auto Deploy",
          "targetEnvironment": "Appian"
        }'

