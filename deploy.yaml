name: Deploy to CALI DEV

on:
  push:
    branches:
    - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy package to CALI DEV
      run: |
        curl -s -X POST "cali-dev.iem-digital.com/suite/deployment-management/v2/deployments" \
        -H "Appian-API-Key: ${{  secrets.APPIAN_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{
          "name": "Auto Deploy",
          "packageId": "REPLACE_PACKAGE_ID"
        }'
      
